<body>

<script src="./../js/video.js"></script>
<script>
  // 视频操作
  var quanFlag = false;  // false 未全屏  true 是全屏
  var videoIndex = 1;    // 默认下标1
  var bofang = false;    // 点击了暂停播放？
  // 操作要求：指针跳转选择
  window.onload = function(){
    // 键盘事件
    window.keyboard();
    window.hideTopBottomCtrlLi()


  }

  function keyboard(){
    // console.log(quanFlag)
    if(quanFlag === false) {
      document.onkeydown=function(event){
        var e = event || window.event || arguments.callee.caller.arguments[0];
        switch(e.keyCode){
          case 37:
            if (videoIndex <= 1) {
              videoIndex = 6;
            } else {
              videoIndex--;
            }
            window.keyFocus(videoIndex);
            break;
          case 38:
            if (videoIndex < 7){
              videoIndex = 8;
            } else if (videoIndex > 8){
              videoIndex = 9;
            } else {
              videoIndex++;
            }
            window.keyFocus(videoIndex);
            break;
          case 39:
            if (videoIndex >= 6) {
              videoIndex = 1;
            } else {
              videoIndex++;
            }
            window.keyFocus(videoIndex);
            break;
          case 40:
            if (videoIndex < 9){
              videoIndex = 1;
            } else {
              videoIndex--;
            }
            window.keyFocus(videoIndex);
            break;
          case 13:
            window.enterKey()

            break;
          default:
            break;
        }
      };
    } else {
      // 将键盘事件释放，遥控器的方向键 控制 视频的播放进度
    }
  }

  function keyFocus(videoIndex){
    // 下标变化，手指变化
    // console.log(videoIndex)
    var go = document.querySelector("#video_focus");
    switch(videoIndex){
      case 1:
        console.log("选中的是：视频01")
        // quanFlag = false;
        go.style.left = "240px";
        go.style.top = "600px";

        break;
      case 2:
        console.log("选中的是：视频02")
        // quanFlag = false;
        go.style.left = "450px";
        go.style.top = "600px";

        break;
      case 3:
        console.log("选中的是：视频03")
        // quanFlag = false;
        go.style.left = "664px";
        go.style.top = "600px";

        break;
      case 4:
        console.log("选中的是：视频04")
        // quanFlag = false;
        go.style.left = "874px";
        go.style.top = "600px";

        break;
      case 5:
        console.log("选中的是：视频05")
        // quanFlag = false;
        go.style.left = "1086px";
        go.style.top = "600px";

        break;
      case 6:
        console.log("选中的是：视频06")
        // quanFlag = false;
        go.style.left = "1300px";
        go.style.top = "600px";

        break;
      case 7:
        // 7 空缺，不用
        break;
      case 8:
        console.log("选中的是：当前MP4,即可失焦",)
        quanFlag = true;
        go.style.left = "-200px";
        go.style.top = "20px";

        break;
      case 9:
        console.log("选中的是：返回按钮")
        // quanFlag = false;
        go.style.left = "40px";
        go.style.top = "20px";

        break;
      default:
        break;
    }
  }

  function enterKey(){
    // 按下确定键
    console.log(videoIndex)
    // if(quanFlag === false){
        switch(videoIndex){
        case 1:
          console.log(video.src)
          video.src = "./../assets/media/lesson1.mp4"

          break;
        case 2:
          video.src = "./../assets/media/lesson2.mp4"

          break;
        case 3:
          video.src = "./../assets/media/lesson3.mp4"

          break;
        case 4:
          video.src = "./../assets/media/lesson4.mp4"

          break;
        case 5:
          video.src = "./../assets/media/lesson5.mp4"

          break;
        case 6:
          video.src = "./../assets/media/lesson6.mp4"

          break;
        case 7:
          // 7 空缺，不用
          break;
        case 8:
          window.setFullScreen()

          break;
        case 9:
          console.log('点击了返回')
          window.history.go(-1)

          break;
        default:
          break;
      }
    // } else if(quanFlag === false) {
    //   console.log('再次点击暂停播放')
    //   window.playpause()
    // } else {

    // }
  }

</script>
<script>
  // window.onload = function () {
  var videoWrap = document.getElementById('testVideo')
  var fullScreen = document.getElementById('getFullScreen')
  var video = new Dvideo ({
    ele: '#testVideo',
    title: '阿拉佳教学视频',
    nextVideoExtend: function () {
      // alert('您点击了下一页')
    },
    showNext: false,
    width: '580px',
    height: '292px',
    src: './../assets/media/lesson1.mp4',
    autoplay: true,
    setVideoDefinition: function (type, e, current) {
      video.showLoading(false)
    },
  })

  // 全屏
  function setFullScreen () {
    console.log('点击了全屏',quanFlag)
    video.launchFullScreen(videoWrap)
    quanFlag = true;

  }

  // 播放
  function play () {
    // 单机一次屏幕 播放
    console.log('点击播放')
    video.videoPlay()

  }

  // 暂停
  function pause () {
    console.log('点击了暂停')
    video.videoPause()

  }

  // 播放暂停
  function playpause () {
    console.log('单击播放和暂停')
    video.videoPlayPause()

  }

  function setVolume (v) {
    console.log('增大音量100')
    video.updateVolume(v)

  }

  function setBackRate (index) {
    console.log('降低音量30')
    video.setPlayBackRate(index)

  }

  function setVideoForward () {
    console.log("快进")
    video.videoForward(10)

  }

  function setVideoRewind () {
    console.log('快退')
    video.videoRewind(10)

  }

  function showLoading () {
    console.log('显示进度信息')
    video.showLoading(true, '视频清晰度切换中，请稍等')

  }

  function showTopBottomCtrlNotClose () {
    console.log('显示上下菜单并且不关闭')
    video.showTopBottomCtrl()

  }

  function hideTopBottomCtrlLi () {
    console.log('关闭上下黑边菜单')
    video.hideTopBottomCtrl(true)

  }

  function showTopBottomCtrl () {
    console.log('显示菜单但会自动关闭')
    video.showTopBottomCtrl(true)

  }

  function hideTopBottomCtrl () {
    console.log('固定时候后自动关闭菜单')
    video.hideTopBottomCtrl()

  }

  function setVideoSize () {
    console.log('设置宽高720,480')
    video.updateVideoSize(720,480)

  }
</script>
</html>
