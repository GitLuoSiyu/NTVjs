<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Levels-two</title>
    <link
      rel="shortcut icon"
      href="./../assets/img/favicon.ico"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./../css/common.css" />
    <script src="./../js/rem.js"></script>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        -webkit-box-sizing: border-box;
        -moz-box-sizing: border-box;
        box-sizing: border-box;
        width: 100%;
        height: 100%;
        background-color: #171717;
      }
      #game_bg { position: relative; z-index: 1;}
      #game_bg div { z-index: 2; position: absolute; background: url(./../assets/img/map_item_bg.png) no-repeat center; background-size: 100% 100%; width: 60px; height: 60px;}
      #game_bg #map-11 {left: 296px; top: 296px;}
      #game_bg #map-12 {left: 326px; top: 380px;}
      #game_bg #map-13 {left: 356px; top: 466px;}
      #game_bg #map-14 {left: 464px; top: 516px;}
      #game_bg #map-15 {left: 576px; top: 532px;}
      #game_bg #map-16 {left: 684px; top: 460px;}
      #game_bg #map-17 {left: 766px; top: 386px;}
      #game_bg #map-18 {left: 880px; top: 360px;}
      #game_bg #map-19 {left: 1020px; top: 360px;}
      #game_bg #map-20 {left: 1140px; top: 330px;}
      #game_bg #player {left: 294px; top: 256px;z-index: 3; position: absolute; background: url(./../assets/img/level_player.png) no-repeat center; background-size: 100% 100%;width: 60px; height: 60px; display: inline-block;}
    </style>
  </head>
  <body>
    <div
      id="shop_bg"
      style="background:url(./../assets/img/levels_two_bg.jpg) no-repeat center; width: 100%; height: 100%; background-size: contain;"
    >
    <div id="game_bg">
        <span id="player"></span>
        <div id="map-11" class=""></div>
        <div id="map-12" class=""></div>
        <div id="map-13" class=""></div>
        <div id="map-14" class=""></div>
        <div id="map-15" class=""></div>
        <div id="map-16" class=""></div>
        <div id="map-17" class=""></div>
        <div id="map-18" class=""></div>
        <div id="map-19" class=""></div>
        <div id="map-20" class=""></div>
      </div>
  </div>
  </body>
  <script src="./../js/store.js"></script>
  <script>
    window.onload = function() {
      window.load();
    };

    function load() {
      console.log('在这里，先判断用户身份和 关卡情况，再进入下一个函数');

      window.boot();
    }

    function boot() {
      console.log('入口函数');
      var mapIndex = 1;
      // 猴子默认下标
      document.onkeydown = function(e) {
        event = e || event;
        switch (event.keyCode) {
          case 8:
            window.history.go(-1);
            break;
          case 13:
            window.enterMap(mapIndex);
            break;
          case 37:
            if (mapIndex <= 1) {
              mapIndex = 10;
            } else {
              mapIndex--;
            }
            window.movePlayer(mapIndex);
            break;
          case 38:
            if (mapIndex >= 10) {
              mapIndex = 1;
            } else {
              mapIndex++;
            }
            window.movePlayer(mapIndex);
            break;
          case 39:
            if (mapIndex >= 10) {
              mapIndex = 1;
            } else {
              mapIndex++;
            }
            window.movePlayer(mapIndex);
            break;
          case 40:
            if (mapIndex <= 1) {
              mapIndex = 10;
            } else {
              mapIndex--;
            }
            window.movePlayer(mapIndex);
            break;
          default:
            break;
        }
      };
    }

    function movePlayer(mapIndex) {
      console.log(mapIndex);
      var select = document.querySelector('#player');
      switch (mapIndex) {
        case 1:
          select.style.left = '294px';
          select.style.top = '256px';

          break;
        case 2:
          select.style.left = '324px';
          select.style.top = '342px';

          break;
        case 3:
          select.style.left = '354px';
          select.style.top = '426px';

          break;
        case 4:
          select.style.left = '462px';
          select.style.top = '476px';

          break;
        case 5:
          select.style.left = '574px';
          select.style.top = '492px';

          break;
        case 6:
          select.style.left = '682px';
          select.style.top = '420px';

          break;
        case 7:
          select.style.left = '764px';
          select.style.top = '348px';

          break;
        case 8:
          select.style.left = '878px';
          select.style.top = '320px';

          break;
        case 9:
          select.style.left = '1018px';
          select.style.top = '320px';

          break;
        case 10:
          select.style.left = '1138px';
          select.style.top = '290px';

          break;
        default:
          break;
      }
    }

    function enterMap(mapIndex) {
      switch (mapIndex) {
        case 1:
          self.location.href = './map11.html';

          break;
        case 2:
          self.location.href = './map12.html';

          break;
        case 3:
          self.location.href = './map13.html';

          break;
        case 4:
          self.location.href = './map14.html';

          break;
        case 5:
          self.location.href = './map15.html';

          break;
        case 6:
          self.location.href = './map16.html';

          break;
        case 7:
          self.location.href = './map17.html';

          break;
        case 8:
          self.location.href = './map18.html';

          break;
        case 9:
          self.location.href = './map19.html';

          break;
        case 10:
          self.location.href = './map20.html';

          break;
        default:
          break;
      }
    }
  </script>
</html>
