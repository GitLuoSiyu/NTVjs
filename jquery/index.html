<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>首页</title>
  <link rel="shortcut icon" href="./../assets/img/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="./www/css/common.css">
  <link rel="stylesheet" href="./www/css/index.css">
  <script src="./www/js/rem.js"></script>
  <script src="./www/lib/jquery.js"></script>
</head>
<body>
  <div id="game">
    <div id="canvas"></div>
    <ul id="menu_maps">
      <li id="map1" class="" ><img src="./www/assets/img/map1.png" alt="" /></li>
      <li id="map2" class="" ><img src="./www/assets/img/map3.png" alt="" /></li>
      <li id="map3" class="" ><img src="./www/assets/img/map2.png" alt="" /></li>
      <li id="payOff" class="" ><img src="./www/assets/img/payOff.png" alt="" /></li>
    </ul>
    <div id="shouzhi"><img src="./www/assets/img/select.png" alt=""></div>
    <audio src="./www/assets/media/select.ogg" id="audio_select"></audio>
  </div>
  <script src="./www/js/store.js"></script>
  <script>


    window.onload= function(){
      this.boot();
    }

    // 手指切换播放音效
    function playAudioSelect(){
      var audio_select = document.querySelector("#audio_select")
      audio_select.play()
    }

    // audio_select.ontimeupdate = function(){
		// 	 if(audio_select.currentTime >= 1000){
    //     audio_select.pause();
		// 	  }
    // };

    function boot(){
      var selectIndex = 2;
      // 默认手指停在 map2 中间的位置， 左边 map1-1，右边map3-3, 下面付费对应4
    　$(document).keydown(function(event){
        // 这里用 三目 运算符 失效
        var go = document.querySelector("#shouzhi");
        switch(event.keyCode){
          case 13:
            switch(selectIndex){
              case 1:
                  self.location.href = "./www/views/map01";
                break;
              case 2:
                  self.location.href = "./www/views/map01";
                break;
              case 3:
                  self.location.href = "./www/views/map11";
                break;
              case 4:
                  self.location.href = "./www/views/shop";
                break;
              case 5:

                break;
              case 6:

                break;
              default:
                break;
            }
            break;
          case 37:
            if(selectIndex == 1){
              selectIndex = 4;
            } else {
              selectIndex--;
            }
            window.playAudioSelect()
            window.keyBoard(selectIndex);
            break;
          case 38:
            if(selectIndex == 4){
              selectIndex = 1;
            } else {
              selectIndex++;
            }
            window.playAudioSelect()
            window.keyBoard(selectIndex);
            break;
          case 39:
            if(selectIndex == 4){
              selectIndex = 1;
            } else {
              selectIndex++;
            }
            window.playAudioSelect()
            window.keyBoard(selectIndex);
            break;
          case 40:
            if(selectIndex == 1){
              selectIndex = 4;
            } else {
              selectIndex--;
            }
            window.playAudioSelect()
            window.keyBoard(selectIndex);
            break;
        }  
  　　});
    }

    function keyBoard(selectIndex){
      // console.log(selectIndex)
      var go = document.querySelector("#shouzhi");
      switch(selectIndex){
        case 1:
          go.style.left = "17%";
          go.style.top = "52%";
          break;
        case 2:
          go.style.left = "48%";
          go.style.top = "52%";
          break;
        case 3:
          go.style.left = "82%";
          go.style.top = "52%";
          break;
        case 4:
          go.style.left = "90%";
          go.style.top = "85%";
          break;
        default:
          break;
      }
    }
    
  </script>
</body>
</html>
