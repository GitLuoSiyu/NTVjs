<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>首页</title>
  <link rel="shortcut icon" href="./../assets/img/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="./www/css/common.css">
  <link rel="stylesheet" href="./www/css/index.css">
  <script src="./www/js/rem.js"></script>
</head>
<body>
  <div id="game">
    <div id="canvas"></div>
    <ul id="menu_maps">
      <li id="map1" class="" ><img src="./www/assets/img/map_one.png" alt="" /></li>
      <li id="map2" class="" ><img src="./www/assets/img/map_two.png" alt="" /></li>
      <li id="map3" class="" ><img src="./www/assets/img/map_shop.png" alt="" /></li>
      <li id="payOff" class="" ><img src="./www/assets/img/purchase.png" alt="" /></li>
    </ul>
    <div id="shouzhi"><img src="./www/assets/img/select.png" alt=""></div>
    <audio src="./www/assets/media/select.ogg" id="audio_select"></audio>
  </div>
  <script src="./www/js/store.js"></script>
  <script>
    window.onload= function(){
      this.boot();
    }
    // 手指切换播放音效
    function playAudioSelect(){
      var audio_select = document.querySelector("#audio_select")
      audio_select.play()
    }
    function boot(){
      var selectIndex = 2;
      // 默认手指停在 map2 中间的位置， 左边 map1-1，右边map3-3, 下面付费对应4
    　document.onkeydown = function(e){
        event = e || event;
        // 这里用 三目 运算符 失效
        var go = document.querySelector("#shouzhi");
        switch(event.keyCode){
          case 8: 
            console.log('点击了返回')
            // window.history.go(-1)
            break;
          case 13:
            switch(selectIndex){
              case 1:
                window.location.href = "./www/views/levelsone.html";
                break;
              case 2:
                window.location.href = "./www/views/levelstwo.html";
                break;
              case 3:
                  self.location.href = "./www/views/shop.html";
                break;
              case 4:
                  self.location.href = "./www/views/purchase.html";
                break;
              case 5:

                break;
              case 6:

                break;
              default:
                break;
            }
            break;
          case 37:
            if(selectIndex == 1){
              selectIndex = 4;
            } else {
              selectIndex--;
            }
            window.playAudioSelect()
            window.keyBoard(selectIndex);
            break;
          case 38:
            if(selectIndex == 4){
              selectIndex = 1;
            } else {
              selectIndex++;
            }
            window.playAudioSelect()
            window.keyBoard(selectIndex);
            break;
          case 39:
            if(selectIndex == 4){
              selectIndex = 1;
            } else {
              selectIndex++;
            }
            window.playAudioSelect()
            window.keyBoard(selectIndex);
            break;
          case 40:
            if(selectIndex == 1){
              selectIndex = 4;
            } else {
              selectIndex--;
            }
            window.playAudioSelect()
            window.keyBoard(selectIndex);
            break;
        }  
  　　}
    }
    
    function keyBoard(selectIndex){
      // console.log(selectIndex)
      var go = document.querySelector("#shouzhi");
      switch(selectIndex){
        case 1:
          go.style.left = "17%";
          go.style.top = "60%";
          break;
        case 2:
          go.style.left = "50%";
          go.style.top = "60%";
          break;
        case 3:
          go.style.left = "82%";
          go.style.top = "60%";
          break;
        case 4:
          go.style.left = "88%";
          go.style.top = "10%";
          break;
        default:
          break;
      }
    }

  </script>
</body>
</html>
